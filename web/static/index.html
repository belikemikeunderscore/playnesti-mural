<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlayNESTI 26 — Mural</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;600&display=swap');

  @font-face {
    font-family: 'Coolvetica';
    src: url('/static/CoolveticaRg.woff2') format('woff2');
    font-weight: normal;
    font-style: normal;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #c8102e;
    --red-dim: rgba(200, 16, 46, 0.15);
    --bg: #080808;
    --surface: #111;
    --text: #f0ece8;
    --muted: #555;
    --fade: 550ms ease;
  }

  html, body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: 'Coolvetica', sans-serif;
  }

  /* ─── IDLE SCREEN ─── */
  #idle {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    background: var(--bg);
    z-index: 10;
    transition: opacity var(--fade);
  }

  #idle.out { opacity: 0; pointer-events: none; }

  .idle-logo {
    max-width: clamp(120px, 40vw, 600px);
    height: auto;
    object-fit: contain;
  }

  .idle-sub {
    font-size: 1rem;
    color: var(--muted);
  }

  .idle-dot {
    width: 6px;
    height: 6px;
    background: var(--red);
    border-radius: 50%;
    animation: blink 1.4s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.2; transform: scale(0.6); }
  }

  /* ─── SLIDE ─── */
  #slide {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity var(--fade);
    background: var(--bg);
  }

  #slide.visible { opacity: 1; }

  #media-wrap {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity var(--fade);
  }

  #media-wrap img,
  #media-wrap video {
    max-width: 100vw;
    max-height: 100vh;
    object-fit: contain;
    display: block;
  }

  /* ─── CAPTION ─── */
  #caption {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 48px 36px 24px;
    background: linear-gradient(to top, rgba(0,0,0,0.92) 0%, transparent 100%);
    display: flex;
    align-items: flex-end;
    gap: 12px;
  }

  .caption-bar {
    width: 3px;
    height: 40px;
    background: var(--red);
    flex-shrink: 0;
    border-radius: 2px;
  }

  .caption-text {
    display: flex;
    flex-direction: column;
    gap: 3px;
    align-items: flex-start;
  }

  #cap-author {
    font-family: 'Coolvetica', sans-serif;
    font-size: 1.4rem;
    color: var(--red);
    line-height: 1;
  }

  #cap-msg {
    font-size: 0.9rem;
    font-weight: 300;
    color: var(--text);
    opacity: 0.8;
    max-width: 70vw;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-height: 1.1rem;
  }

  /* ─── PROGRESS BAR ─── */
  #progress {
    position: absolute;
    bottom: 0;
    left: 0;
    height: 3px;
    width: 0%;
    background: var(--red);
    box-shadow: 0 0 12px var(--red);
    border-radius: 0 2px 2px 0;
  }

  /* ─── QUEUE BADGE ─── */
  #queue-badge {
    position: fixed;
    top: 18px;
    right: 20px;
    font-size: 0.7rem;
    color: var(--muted);
    background: rgba(255,255,255,0.04);
    border: 1px solid #222;
    border-radius: 20px;
    padding: 5px 12px;
    display: none;
    z-index: 20;
  }

  #queue-badge.visible { display: block; }

  /* ─── CORNER BRAND ─── */
  #corner {
    position: fixed;
    top: 18px;
    left: 20px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    font-family: 'Coolvetica', sans-serif;
    font-size: 0.75rem;
    color: var(--text);
    z-index: 22;
    max-width: 250px;
    line-height: 1.4;
  }

  #corner .red { color: var(--red); }

  #qr-code {
    margin-top: 10px;
    width: 80px;
    height: 80px;
    object-fit: contain;
  }

  /* ─── WS STATUS DOT ─── */
  #ws-dot {
    position: fixed;
    bottom: 14px;
    right: 16px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #333;
    z-index: 20;
    transition: background 0.4s;
  }

  #ws-dot.connected { background: #2ecc71; }
  #ws-dot.error { background: var(--red); }

  /* ─── VIDEO TIMER ─── */
  #video-timer {
    position: fixed;
    top: 18px;
    right: 20px;
    font-family: 'Coolvetica', sans-serif;
    font-size: 0.9rem;
    color: var(--text);
    display: none;
    z-index: 21;
  }

  #video-timer.visible { display: block; }
</style>
</head>
<body>

<div id="corner">
  Envia as tuas fotos para o <span class="red">#mural-playnesti26</span> no nosso Discord
  <img id="qr-code" src="/static/qr-code.png" alt="QR Code">
</div>

<div id="idle">
  <img src="/static/logo.png" alt="PlayNESTI" class="idle-logo">
  <div class="idle-sub">Envia as tuas fotos para o #mural-playnesti26 no nosso Discord</div>
  <div class="idle-dot"></div>
</div>

<div id="slide">
  <div id="media-wrap"></div>
  <div id="caption">
    <div class="caption-bar"></div>
    <div class="caption-text">
      <span id="cap-author"></span>
      <span id="cap-msg"></span>
    </div>
  </div>
  <div id="progress"></div>
</div>

<div id="queue-badge"></div>
<div id="video-timer"></div>
<div id="ws-dot"></div>

<script>
const IMAGE_DURATION = 5000;
const FADE_MS = 550;

const slideEl    = document.getElementById('slide');
const idleEl     = document.getElementById('idle');
const mediaWrap  = document.getElementById('media-wrap');
const capAuthor  = document.getElementById('cap-author');
const capMsg     = document.getElementById('cap-msg');
const progressEl = document.getElementById('progress');
const badge      = document.getElementById('queue-badge');
const timerEl    = document.getElementById('video-timer');
const wsDot      = document.getElementById('ws-dot');

const queue = [];
const allItems = [];
const allItemIds = new Set();
let running = false;
let currentItemId = null;
let currentMessageId = null;
let rotationIndex = 0;
let timerInterval = null;

function formatTime(seconds) {
  const mins = Math.floor(seconds / 60);
  const secs = Math.floor(seconds % 60);
  return `${mins}:${secs.toString().padStart(2, '0')}`;
}

function hideTimer() {
  if (timerInterval) {
    clearInterval(timerInterval);
    timerInterval = null;
  }
  timerEl.classList.remove('visible');
}

const sleep = ms => new Promise(r => setTimeout(r, ms));

function updateBadge() {
  if (queue.length > 0) {
    badge.textContent = `+${queue.length} em fila`;
    badge.classList.add('visible');
  } else {
    badge.classList.remove('visible');
  }
}

async function showIdle(show) {
  if (show) {
    idleEl.classList.remove('out');
  } else {
    idleEl.classList.add('out');
  }
}

async function fadeIn() {
  slideEl.classList.add('visible');
  await sleep(FADE_MS);
}

async function fadeOut() {
  slideEl.classList.remove('visible');
  await sleep(FADE_MS);
}

function startProgress(duration) {
  progressEl.style.transition = 'none';
  progressEl.style.width = '0%';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    progressEl.style.transition = `width ${duration}ms linear`;
    progressEl.style.width = '100%';
  }));
}

function buildMedia(item) {
  mediaWrap.innerHTML = '';

  if (item.type === 'image') {
    const img = document.createElement('img');
    img.src = item.url;
    mediaWrap.appendChild(img);
    return new Promise(resolve => {
      if (img.complete) {
        resolve(null);
      } else {
        img.onload = () => resolve(null);
        img.onerror = () => resolve(null);
      }
    });
  }

  const vid = document.createElement('video');
  vid.src = item.url;
  vid.playsInline = true;
  vid.controls = false;
  mediaWrap.appendChild(vid);
  return new Promise(resolve => {
    if (vid.readyState >= 1) {
      resolve(vid);
    } else {
      vid.oncanplay = () => resolve(vid);
      vid.onerror = () => resolve(vid);
    }
  });
}

function waitForItem(item, vid) {
  return new Promise(resolve => {
    if (item.type === 'image') {
      hideTimer();
      startProgress(IMAGE_DURATION);
      setTimeout(resolve, IMAGE_DURATION);
      return;
    }
    
    let done = false;
    const finish = () => { if (!done) { done = true; hideTimer(); resolve(); } };
    
    const onCanPlay = () => {
      const duration = vid.duration;
      if (duration && isFinite(duration)) {
        startProgress(duration * 1000);
        
        // Show timer and update it
        timerEl.classList.add('visible');
        if (timerInterval) clearInterval(timerInterval);
        
        timerInterval = setInterval(() => {
          const remaining = vid.duration - vid.currentTime;
          if (remaining > 0) {
            timerEl.textContent = formatTime(remaining);
          }
        }, 100);
      }
    };
    
    if (vid.readyState >= 2) {
      onCanPlay();
    } else {
      vid.addEventListener('canplay', onCanPlay, { once: true });
    }
    
    vid.addEventListener('ended', finish, { once: true });
    vid.addEventListener('error', finish, { once: true });
    setTimeout(finish, 120_000);
    vid.play().catch(finish);
  });
}

async function displayItem(item) {
  const sameMessage = item.message_id && item.message_id === currentMessageId;
  const vidPromise = buildMedia(item);
  const vid = await vidPromise;

  if (!sameMessage) {
    capAuthor.textContent = item.author || '';
    capMsg.textContent = item.text || '';
    capMsg.style.visibility = item.text ? 'visible' : 'hidden';
  }

  currentItemId = item.id;
  currentMessageId = item.message_id || null;

  if (!sameMessage) {
    await showIdle(false);
    await fadeIn();
    await waitForItem(item, vid);
    await fadeOut();
    return;
  }

  // Same message group: ensure slide is visible, then swap media
  if (!slideEl.classList.contains('visible')) {
    slideEl.classList.add('visible');
    await sleep(FADE_MS);
  }
  mediaWrap.style.opacity = '0';
  await sleep(FADE_MS);
  mediaWrap.style.opacity = '1';
  await waitForItem(item, vid);
}

function getNextItem() {
  if (queue.length > 0) {
    return queue.shift();
  }

  // Cycle through all stored items in order to avoid repeats.
  if (allItems.length > 0) {
    const item = allItems[rotationIndex % allItems.length];
    rotationIndex += 1;
    return item;
  }

  return null;
}

async function runQueue() {
  if (running) return;
  running = true;

  await showIdle(true);
  await sleep(1000);

  while (true) {
    updateBadge();
    const item = getNextItem();
    if (item) {
      await displayItem(item);
    } else {
      // No items available - show idle and wait
      if (!idleEl.classList.contains('out')) {
        await sleep(1000);
      } else {
        await showIdle(true);
        await sleep(1000);
      }
    }
  }
}

function addItems(items) {
  const newItems = items.map(item => ({
    ...item,
    id: item.url // Use URL as unique ID
  }));

  newItems.forEach(item => {
    if (allItemIds.has(item.id)) {
      return;
    }
    allItemIds.add(item.id);
    allItems.push(item);
    queue.push(item);
  });

  updateBadge();
  if (!running) runQueue();
}

function removeItem(itemId) {
  const idx = allItems.findIndex(item => item.id === itemId);
  if (idx >= 0) {
    allItems.splice(idx, 1);
    allItemIds.delete(itemId);
    if (idx < rotationIndex) rotationIndex -= 1;
  }

  const queueIdx = queue.findIndex(item => item.id === itemId);
  if (queueIdx >= 0) {
    queue.splice(queueIdx, 1);
    updateBadge();
  }
}

function connect() {
  const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const ws = new WebSocket(`${protocol}//${location.host}/ws`);

  ws.onopen = () => wsDot.className = 'connected';

  ws.onmessage = ({ data }) => {
    const msg = JSON.parse(data);
    if (msg.type === 'init' || msg.type === 'add') addItems(msg.items);
    if (msg.type === 'remove') removeItem(msg.id);
  };

  ws.onclose = () => {
    wsDot.className = 'error';
    setTimeout(connect, 3000);
  };

  ws.onerror = () => ws.close();
}

connect();
</script>
</body>
</html>
